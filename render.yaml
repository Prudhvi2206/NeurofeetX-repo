services:
  # ── Backend: Spring Boot API ──
  - type: web
    name: neurofleetx-api
    runtime: java
    plan: free
    rootDir: fleetmanagement
    buildCommand: ./mvnw package -DskipTests
    startCommand: java -jar target/fleetmanagement-0.0.1-SNAPSHOT.jar
    envVars:
      - key: PORT
        value: 8080
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # you will set this in the Render dashboard after first deploy
      - key: JAVA_VERSION
        value: 17

  # ── Frontend: React + Vite Static Site ──
  - type: web
    name: neurofleetx-frontend
    runtime: static
    plan: free
    rootDir: myapp
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false          # you will set this in the Render dashboard after first deploy
